name: SauceDemo UI Automation — CI

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to run tests on (chrome|firefox|edge)"
        required: false
        default: "chrome"

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"
  STD_USER_USERNAME: ${{ secrets.STD_USER_USERNAME }}
  STD_USER_PASSWORD: ${{ secrets.STD_USER_PASSWORD }}

jobs:
  test:
    name: Run UI Tests
    runs-on: ubuntu-latest

    env:
      BROWSER: ${{ github.event.inputs.browser || 'chrome' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install Chrome
        if: env.BROWSER == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Install Firefox
        if: env.BROWSER == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Install Edge
        if: env.BROWSER == 'edge'
        uses: browser-actions/setup-edge@v1

      - name: Verify browser
        run: |
          if [ "${BROWSER}" = "chrome" ]; then google-chrome --version; fi
          if [ "${BROWSER}" = "firefox" ]; then firefox --version; fi
          if [ "${BROWSER}" = "edge" ]; then microsoft-edge --version; fi

      - name: Create output directories
        run: |
          mkdir -p target/screenshots
          mkdir -p target/allure-results
          mkdir -p target/logs
          mkdir -p target/surefire-reports

      - name: Build & run tests
        run: mvn -B -Denv=qa --no-transfer-progress clean test

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: target/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: target/logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Surefire XML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

      - name: Generate Allure HTML report
        if: always()
        run: |
          echo "Generating Allure report..."
          mvn allure:report --no-transfer-progress || true

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: target/site/allure-maven-plugin/
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail CI if tests failed
        if: always()
        run: |
          RESULT=$(find target/surefire-reports -name "*.xml" 2>/dev/null \
            | xargs grep -l 'failures="[1-9]\|errors="[1-9]' || true | wc -l)
          if [ "$RESULT" -gt "0" ]; then
            echo "::error::Test failures found. Check Allure report."
            exit 1
          fi
          echo "All tests passed successfully."